<div id="Skewness"><h2 id="Skewness" class="header"><a href="#Skewness">Skewness</a></h2></div>
<p>
Skewness refers to the degree of distortion from the symmetrical bell curve or the normal distribution.
</p>

<p>
A symmetrical distribution should have a skewness of 0, considering it is symmetrical.
</p>
